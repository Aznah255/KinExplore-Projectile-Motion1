&lt;section class=&quot;center&quot;&gt;&lt;section class=&quot;simPanel&quot;&gt;&lt;div class=&quot;simHead&quot;&gt;&lt;div id=&quot;expCount&quot;&gt;EXPERIMENT 1 OF 5&lt;/div&gt;&lt;div id=&quot;expTitle&quot;&gt;SAME SPEED, DIFFERENT ANGLES&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;sky&quot; id=&quot;sky&quot;&gt;&lt;div class=&quot;v7badge&quot;&gt;V7 Release Candidate&lt;/div&gt;&lt;div class=&quot;cloud c1&quot;&gt;&lt;/div&gt;&lt;div class=&quot;cloud c2&quot;&gt;&lt;/div&gt;&lt;div class=&quot;land&quot;&gt;&lt;/div&gt;&lt;div class=&quot;slope&quot;&gt;&lt;/div&gt;&lt;div class=&quot;water&quot;&gt;&lt;/div&gt;&lt;div class=&quot;conditions&quot; id=&quot;conditions&quot;&gt;&lt;/div&gt;&lt;svg class=&quot;svg&quot; id=&quot;pathSvg&quot;&gt;&lt;/svg&gt;&lt;div class=&quot;cannon&quot;&gt;&lt;div class=&quot;barrel&quot; id=&quot;barrel&quot;&gt;&lt;/div&gt;&lt;div class=&quot;base&quot;&gt;&lt;/div&gt;&lt;div class=&quot;wheel&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;muzzleMark&quot; id=&quot;muzzleMark&quot;&gt;&lt;/div&gt;&lt;div class=&quot;ball bA&quot; id=&quot;ballA&quot;&gt;&lt;/div&gt;&lt;div class=&quot;ball bB&quot; id=&quot;ballB&quot;&gt;&lt;/div&gt;&lt;div class=&quot;ball bC&quot; id=&quot;ballC&quot;&gt;&lt;/div&gt;&lt;div class=&quot;label la&quot; id=&quot;labelA&quot;&gt;A&lt;/div&gt;&lt;div class=&quot;label lb&quot; id=&quot;labelB&quot;&gt;B&lt;/div&gt;&lt;div class=&quot;label lc&quot; id=&quot;labelC&quot;&gt;C&lt;/div&gt;&lt;div class=&quot;notice&quot;&gt;💡 &lt;b&gt;Important:&lt;/b&gt; All projectile paths start from the end of the cannon barrel.&lt;/div&gt;&lt;div class=&quot;simControls&quot;&gt;&lt;button class=&quot;reset&quot; id=&quot;resetBtn&quot;&gt;⟳ RESET&lt;/button&gt;&lt;button class=&quot;play&quot; disabled=&quot;&quot; id=&quot;playBtn&quot;&gt;▶ PLAY SIMULATION 🔒&lt;/button&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;div class=&quot;bottomGrid&quot;&gt;&lt;section class=&quot;questions&quot;&gt;&lt;h3&gt;PREDICTION QUESTIONS &lt;small&gt;(All must be answered before you can play)&lt;/small&gt;&lt;/h3&gt;&lt;div class=&quot;qbody&quot; id=&quot;questions&quot;&gt;&lt;/div&gt;&lt;/section&gt;&lt;section class=&quot;explain&quot;&gt;&lt;h3&gt;EXPLANATION &lt;small&gt;(Will appear after simulation)&lt;/small&gt;&lt;/h3&gt;&lt;div class=&quot;ebody&quot; id=&quot;explainBox&quot;&gt;&lt;div class=&quot;emptyExp&quot;&gt;&lt;div class=&quot;scopeIcon&quot;&gt;🔭&lt;/div&gt;&lt;div&gt;Run the simulation to see&lt;br/&gt;the results and explanation.&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;/div&gt;&lt;/section&gt;

riments!&lt;/span&gt;&lt;span class=&quot;devCreditPage1&quot;&gt;Developed by: Mdm Aznah Physics Lecture KMM&lt;/span&gt;&lt;span&gt;© KinExplore Learning Board Classroom&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
&lt;script&gt;
const experiments=[
{title:'SAME SPEED, DIFFERENT ANGLES',cond:['Same initial speed: 20 m/s','Same height','Negligible air resistance','g = 9.81 m/s² (Earth)'],concept:'Changing the launch angle changes the horizontal and vertical velocity components. At equal launch and landing height, 45° gives the greatest Sx.',items:[{id:'A',label:'30°',u:20,angle:30,g:9.81},{id:'B',label:'45°',u:20,angle:45,g:9.81},{id:'C',label:'60°',u:20,angle:60,g:9.81}],answers:{sx:'B',height:'C',time:'C'},reflect:'Why does 45° give the greatest horizontal Sx here?',choices:['It balances horizontal and vertical velocity components.','Gravity becomes zero at 45° launch.','The projectile has no vertical velocity.','Air resistance is stronger at other angles.'],correct:0,explain:'45° gives the best balance between horizontal speed and time of flight, so Sx is maximum.'},
{title:'SAME ANGLE, DIFFERENT SPEEDS',cond:['Same launch angle: 45°','Different initial speeds','Same height','g = 9.81 m/s² (Earth)'],concept:'When the angle is fixed, increasing initial speed increases horizontal Sx, maximum height and time of flight.',items:[{id:'A',label:'10 m/s',u:10,angle:45,g:9.81},{id:'B',label:'20 m/s',u:20,angle:45,g:9.81},{id:'C',label:'30 m/s',u:30,angle:45,g:9.81}],answers:{sx:'C',height:'C',time:'C'},reflect:'Why does the 30 m/s projectile travel furthest?',choices:['It has greater horizontal and vertical components of velocity.','It experiences no gravity.','Its mass is larger.','Its angle is smaller.'],correct:0,explain:'Higher initial speed gives larger velocity components, producing higher, longer and farther motion.'},
{title:'DIFFERENT PLANETS',cond:['Same initial speed: 20 m/s','Same angle: 45°','Different gravitational acceleration','No air resistance'],concept:'Lower gravitational acceleration allows the projectile to remain in the air longer, rise higher and travel further.',items:[{id:'A',label:'Earth',u:20,angle:45,g:9.81},{id:'B',label:'Moon',u:20,angle:45,g:1.62},{id:'C',label:'Mars',u:20,angle:45,g:3.71}],answers:{sx:'B',height:'B',time:'B'},reflect:'Why is the Moon trajectory the longest?',choices:['The Moon has weaker gravitational acceleration.','The launch speed becomes larger on the Moon.','The angle changes automatically.','The projectile has no horizontal velocity.'],correct:0,explain:'With smaller g, downward acceleration is weaker, so the projectile stays in the air longer.'},
{title:'HORIZONTAL vs ANGLED LAUNCH',cond:['Same initial speed: 20 m/s','Same height','Negligible air resistance','g = 9.81 m/s² (Earth)'],concept:'Horizontal launch has no initial vertical velocity. Angled launch has horizontal and vertical components, so it rises first before falling.',items:[{id:'A',label:'Horizontal',u:20,angle:0,g:9.81,y0:0},{id:'B',label:'30° Angle',u:20,angle:30,g:9.81,y0:0},{id:'C',label:'45° Angle',u:20,angle:45,g:9.81,y0:0}],answers:{sx:'C',height:'C',time:'C'},reflect:'Why does the 45° launch travel greater Sx than the horizontal launch?',choices:['It has an upward component of velocity that keeps it in the air longer.','It has a larger initial speed.','Gravity is weaker for the 45° launch.','Air resistance is less for 45° launch.'],correct:0,explain:'The angled launch rises first, increasing time of flight. More time in air allows it to travel greater Sx.'},
{title:'HIGH ANGLE vs LOW ANGLE',cond:['Same initial speed: 22 m/s','Different launch angles','Same height','g = 9.81 m/s² (Earth)'],concept:'Low angle gives more horizontal velocity. High angle gives more vertical velocity. A middle angle near 45° gives maximum Sx.',items:[{id:'A',label:'25°',u:22,angle:25,g:9.81},{id:'B',label:'45°',u:22,angle:45,g:9.81},{id:'C',label:'65°',u:22,angle:65,g:9.81}],answers:{sx:'B',height:'C',time:'C'},reflect:'Why does the 65° projectile go highest but not furthest?',choices:['It has a large vertical component but smaller horizontal component.','It has the largest horizontal velocity.','Gravity acts upward.','It has no vertical velocity.'],correct:0,explain:'The high angle sends more velocity upward, but leaves less horizontal velocity for Sx.'}
];
let current=0,score=0,submitted=false,played=false,answerChecked=false;
const colors={A:'#0a51d5',B:'#e92429',C:'#1b8e31'};
function calc(p){const r=p.angle*Math.PI/180,u=p.u,g=p.g,y0=p.y0||0,ux=u*Math.cos(r),uy=u*Math.sin(r);let t=(uy+Math.sqrt(uy*uy+2*g*y0))/g;if(p.angle===0&amp;&amp;y0===0)t=.85;const Sx=ux*t,h=y0+(uy*uy)/(2*g);return{ux,uy,t,Sx,h};}
function muzzle(){const sky=document.getElementById('sky'), br=document.getElementById('barrel').getBoundingClientRect(), sr=sky.getBoundingClientRect();const ang=-24*Math.PI/180;const x=br.left-sr.left + br.width - 1;const y=br.top-sr.top + br.height/2 + Math.sin(ang)*br.width*0.06;return{x,y,groundY:sky.clientHeight-160};}
function dataDash(){const labels=['Sx (m)','Hmax (m)','T (s)','ux (m s⁻¹)','uy (m s⁻¹)'];document.getElementById('dataRows').innerHTML=labels.map(l=&gt;`&lt;tr&gt;&lt;td&gt;${l}&lt;/td&gt;&lt;td&gt;—&lt;/td&gt;&lt;td&gt;—&lt;/td&gt;&lt;td&gt;—&lt;/td&gt;&lt;/tr&gt;`).join('')}
function render(){const e=experiments[current];submitted=played=answerChecked=false;document.getElementById('expCount').textContent=`EXPERIMENT ${current+1} OF ${experiments.length}`;document.getElementById('expTitle').textContent=e.title;document.getElementById('conditions').innerHTML='&lt;b&gt;LAUNCH CONDITIONS&lt;/b&gt;'+e.cond.map(x=&gt;'• '+x).join('&lt;br&gt;');document.getElementById('conceptBox').innerHTML=e.concept;['A','B','C'].forEach(id=&gt;{let item=e.items.find(x=&gt;x.id===id);document.getElementById('head'+id).innerHTML=`${id}&lt;br&gt;&lt;span style=&quot;color:${colors[id]}&quot;&gt;${item.label}&lt;/span&gt;`;document.getElementById('ball'+id).style.display='none';document.getElementById('label'+id).style.display='none';});document.getElementById('questions').innerHTML=[['sx','Which projectile has the greatest horizontal displacement, Sx?'],['height','Which projectile reaches a higher point?'],['time','Which projectile stays longer in air?']].map((q,i)=&gt;`&lt;div class=&quot;qrow&quot;&gt;&lt;span class=&quot;qnum&quot;&gt;${i+1}&lt;/span&gt;&lt;span&gt;${q[1]}&lt;/span&gt;&lt;select id=&quot;q_${q[0]}&quot;&gt;&lt;option value=&quot;&quot;&gt;-- Choose --&lt;/option&gt;${e.items.map(it=&gt;`&lt;option value=&quot;${it.id}&quot;&gt;${it.id} (${it.label})&lt;/option&gt;`).join('')}&lt;/select&gt;&lt;/div&gt;`).join('')+`&lt;button class=&quot;submit&quot; id=&quot;submitBtn&quot;&gt;✈ SUBMIT PREDICTIONS&lt;/button&gt;`;document.getElementById('submitBtn').onclick=submit;document.getElementById('playBtn').disabled=true;document.getElementById('playBtn').innerHTML='▶ PLAY SIMULATION 🔒';document.getElementById('explainBox').innerHTML='&lt;div class=&quot;emptyExp&quot;&gt;&lt;div class=&quot;scopeIcon&quot;&gt;🔭&lt;/div&gt;&lt;div&gt;Run the simulation to see&lt;br&gt;the results and explanation.&lt;/div&gt;&lt;/div&gt;';document.getElementById('reflectQuestion').innerHTML='&lt;b&gt;'+e.reflect+'&lt;/b&gt;'+e.choices.map((c,i)=&gt;`&lt;label class=&quot;choice&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;reflect&quot; value=&quot;${i}&quot;&gt; ${String.fromCharCode(65+i)}. ${c}&lt;/label&gt;`).join('');document.getElementById('pathSvg').innerHTML='';dataDash();renderButtons();renderDots();showMuzzle();}
function renderButtons(){document.getElementById('expButtons').innerHTML=experiments.map((e,i)=&gt;`&lt;button class=&quot;expBtn ${i===current?'active':''}&quot; onclick=&quot;go(${i})&quot;&gt;&lt;span class=&quot;numCircle&quot;&gt;${i+1}&lt;/span&gt;${e.title.replace('SAME SPEED, DIFFERENT ANGLES','Same Speed&lt;br&gt;Different Angles').replace('SAME ANGLE, DIFFERENT SPEEDS','Same Angle&lt;br&gt;Different Speeds').replace('DIFFERENT PLANETS','Different Planets').replace('HORIZONTAL vs ANGLED LAUNCH','Horizontal vs&lt;br&gt;Angled Launch').replace('HIGH ANGLE vs LOW ANGLE','High Angle vs&lt;br&gt;Low Angle')}&lt;/button&gt;`).join('')}
function renderDots(){document.getElementById('dots').innerHTML=experiments.map((_,i)=&gt;`&lt;div class=&quot;dotp ${i&lt;current?'done':''} ${i===current?'active':''}&quot;&gt;${i+1}&lt;/div&gt;`).join('')}
function showMuzzle(){requestAnimationFrame(()=&gt;{const m=muzzle(), mark=document.getElementById('muzzleMark');mark.style.left=(m.x-4)+'px';mark.style.top=(m.y-4)+'px';mark.style.display='block'})}
function go(i){current=i;render()}
function submit(){let keys=['sx','height','time'],e=experiments[current];if(keys.some(k=&gt;!document.getElementById('q_'+k).value)){alert('Please answer all prediction questions first.');return}let gained=0;keys.forEach(k=&gt;{if(document.getElementById('q_'+k).value===e.answers[k])gained+=5});score+=gained;document.getElementById('crystalNum').textContent=`${Math.min(25,Math.round(score/3))} / 25`;document.getElementById('explainBox').innerHTML=`&lt;b&gt;Predictions submitted.&lt;/b&gt;&lt;br&gt;&lt;br&gt;You scored &lt;b&gt;${gained}/15&lt;/b&gt; for this round.&lt;br&gt;&lt;br&gt;Now click &lt;b&gt;PLAY SIMULATION&lt;/b&gt; to observe the result.`;submitted=true;document.getElementById('submitBtn').disabled=true;document.getElementById('playBtn').disabled=false;document.getElementById('playBtn').innerHTML='▶ PLAY SIMULATION 🔓'}

function labelPoint(expIndex,p,v,m,scaleX,scaleY,w,h){
 const plans=[
  {A:[.76,18,18],B:[.62,22,-58],C:[.43,24,-58]},
  {A:[.66,18,18],B:[.58,22,-44],C:[.52,26,-58]},
  {A:[.48,18,20],B:[.54,22,-62],C:[.61,20,-38]},
  {A:[.66,18,20],B:[.56,20,-54],C:[.49,24,-72]},
  {A:[.75,18,20],B:[.61,20,-54],C:[.43,24,-64]}
 ];
 let [f,dx,dy]=(plans[expIndex]&amp;&amp;plans[expIndex][p.id])||[.55,18,-36];
 let t=v.t*f, x=v.ux*t, y=(p.y0||0)+v.uy*t-.5*p.g*t*t;
 let px=m.x+x*scaleX+dx, py=m.y-y*scaleY+dy;
 px=Math.max(10,Math.min(px,w-130));
 py=Math.max(50,Math.min(py,h-150));
 return {x:px,y:py};
}
function separateLabels(labels,w,h){
 for(let pass=0;pass&lt;8;pass++){
  for(let i=0;i&lt;labels.length;i++)for(let j=i+1;j&lt;labels.length;j++){
   let a=labels[i],b=labels[j];
   if(!(a.x+a.w&lt;b.x || b.x+b.w&lt;a.x || a.y+a.h&lt;b.y || b.y+b.h&lt;a.y)){
    if(a.y&lt;=b.y){a.y-=16;b.y+=16}else{a.y+=16;b.y-=16}
    a.y=Math.max(45,Math.min(a.y,h-155)); b.y=Math.max(45,Math.min(b.y,h-155));
   }
  }
 }
 labels.forEach(o=&gt;{o.el.style.left=o.x+'px';o.el.style.top=o.y+'px'});
}
function draw(){
 const sky=document.getElementById('sky'),svg=document.getElementById('pathSvg'),e=experiments[current],vals=e.items.map(calc),m=muzzle(),w=sky.clientWidth,h=sky.clientHeight;
 let maxR=Math.max(...vals.map(v=&gt;v.Sx)),maxH=Math.max(.1,...vals.map(v=&gt;v.h));
 let scaleX=(w-m.x-85)/maxR,scaleY=(m.y-92)/maxH;
 if(current===3)scaleY=(m.y-62)/Math.max(maxH,1);
 svg.setAttribute('viewBox',`0 0 ${w} ${h}`);svg.innerHTML='';let labelBoxes=[];
 e.items.forEach((p,i)=&gt;{
  let v=vals[i],d='';
  for(let s=0;s&lt;=90;s++){
   let t=v.t*s/90,x=v.ux*t,y=(p.y0||0)+v.uy*t-.5*p.g*t*t;
   let px=m.x+x*scaleX,py=m.y-y*scaleY;
   d+=(s?' L':'M')+px.toFixed(2)+' '+py.toFixed(2);
  }
  let path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',d);path.setAttribute('fill','none');path.setAttribute('stroke',colors[p.id]);path.setAttribute('stroke-width','4');path.setAttribute('stroke-dasharray','8 10');path.setAttribute('stroke-linecap','round');path.setAttribute('opacity','.92');
  svg.appendChild(path);
  let lab=document.getElementById('label'+p.id);lab.textContent=`${p.id} (${p.label})`;lab.style.display='block';
  let pos=labelPoint(current,p,v,m,scaleX,scaleY,w,h);lab.style.left=pos.x+'px';lab.style.top=pos.y+'px';
  let approxW=Math.max(80,lab.textContent.length*8+25);labelBoxes.push({el:lab,x:pos.x,y:pos.y,w:approxW,h:34});
 });
 separateLabels(labelBoxes,w,h);return{vals,scaleX,scaleY,start:m,maxT:Math.max(...vals.map(v=&gt;v.t))}
}

function play(){if(!submitted)return;const info=draw(),e=experiments[current];document.getElementById('playBtn').disabled=true;let start=null;function step(ts){if(!start)start=ts;let f=Math.min((ts-start)/2600,1);e.items.forEach((p,i)=&gt;{let v=info.vals[i],t=v.t*Math.min(f*info.maxT/v.t,1),x=v.ux*t,y=(p.y0||0)+v.uy*t-.5*p.g*t*t,b=document.getElementById('ball'+p.id);b.style.display='block';b.style.left=(info.start.x+x*info.scaleX-7)+'px';b.style.top=(info.start.y-y*info.scaleY-7)+'px'});if(f&lt;1)requestAnimationFrame(step);else finish(info.vals)}requestAnimationFrame(step)}
function finish(vals){const e=experiments[current],rows=[['Sx (m)',v=&gt;v.Sx.toFixed(1)],['Hmax (m)',v=&gt;v.h.toFixed(1)],['T (s)',v=&gt;v.t.toFixed(2)],['ux (m s⁻¹)',v=&gt;v.ux.toFixed(1)],['uy (m s⁻¹)',v=&gt;v.uy.toFixed(1)]];document.getElementById('dataRows').innerHTML=rows.map(r=&gt;`&lt;tr&gt;&lt;td&gt;${r[0]}&lt;/td&gt;${vals.map(v=&gt;`&lt;td&gt;${r[1](v)}&lt;/td&gt;`).join('')}&lt;/tr&gt;`).join('');document.getElementById('explainBox').innerHTML=`&lt;b&gt;Explanation:&lt;/b&gt;&lt;br&gt;${e.explain}`;played=true}

function renderCaseList(){document.getElementById('caseList').innerHTML=visibleCases().map(c=&gt;`&lt;div class=&quot;session ${c.id===activeCase?'active':''}&quot; onclick=&quot;selectCase(${c.id})&quot;&gt;&lt;span class=&quot;num&quot;&gt;${c.id}&lt;/span&gt;&lt;span&gt;${c.title}&lt;/span&gt;&lt;/div&gt;`).join('')}
function selectCase(id){activeCase=id;renderCaseList();document.querySelectorAll('.case').forEach(el=&gt;el.classList.toggle('active',Number(el.dataset.id)===id));updateSignPanel();}
function updateSignPanel(){const c=cases.find(x=&gt;x.id===activeCase);const signClass=s=&gt;s==='+'?'plus':s==='−'?'minus':'zero';document.getElementById('signRows').innerHTML=Object.entries(c.vals).map(([q,[sg,rsn]])=&gt;`&lt;tr&gt;&lt;td&gt;&lt;b&gt;${q}&lt;/b&gt;&lt;/td&gt;&lt;td class=&quot;${signClass(sg)}&quot;&gt;${sg}&lt;/td&gt;&lt;td&gt;${rsn}&lt;/td&gt;&lt;/tr&gt;`).join('');document.getElementById('tipBox').innerHTML=`&lt;b&gt;Case ${c.id}: ${c.title}&lt;/b&gt;&lt;br&gt;${c.tip}`;}
function makeCards(){const root=document.getElementById('cases');root.innerHTML='';visibleCases().forEach(c=&gt;{if(!state[c.id])state[c.id]={t:0,playing:false,done:false,trail:[],paused:false};const div=document.createElement('section');div.className='case '+(c.id===activeCase?'active':'');div.dataset.id=c.id;div.innerHTML=`&lt;div class=&quot;caseHead&quot; onclick=&quot;selectCase(${c.id})&quot;&gt;&lt;span class=&quot;badge&quot;&gt;CASE ${c.id}&lt;/span&gt;&lt;span&gt;${c.title}&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;canvasWrap&quot;&gt;&lt;canvas id=&quot;cv${c.id}&quot;&gt;&lt;/canvas&gt;&lt;div class=&quot;legend&quot;&gt;Path appears only after Play&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;controls&quot;&gt;&lt;button class=&quot;ctrl play&quot; id=&quot;play${c.id}&quot; onclick=&quot;playCase(${c.id})&quot;&gt;▶ PLAY&lt;/button&gt;&lt;button class=&quot;ctrl pause&quot; id=&quot;pause${c.id}&quot; onclick=&quot;pauseCase(${c.id})&quot;&gt;⏸ PAUSE&lt;/button&gt;&lt;button class=&quot;ctrl step&quot; id=&quot;step${c.id}&quot; onclick=&quot;stepCase(${c.id})&quot;&gt;⏭ STEP&lt;/button&gt;&lt;button class=&quot;ctrl replay&quot; id=&quot;replay${c.id}&quot; onclick=&quot;replayCase(${c.id})&quot;&gt;⟲ REPLAY&lt;/button&gt;&lt;/div&gt;`;root.appendChild(div);});requestAnimationFrame(()=&gt;visibleCases().forEach(drawCase));}
function resizeCanvas(cv){const r=cv.parentElement.getBoundingClientRect();const dpr=window.devicePixelRatio||1;cv.width=Math.max(320,Math.floor(r.width*dpr));cv.height=Math.max(210,Math.floor(r.height*dpr));cv.style.width=r.width+'px';cv.style.height=r.height+'px';const ctx=cv.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);return {w:r.width,h:r.height,ctx};}
function trajectory(c){const g=9.81,a=c.angle*Math.PI/180,ux=c.u*Math.cos(a),uy=c.u*Math.sin(a);let tf;if(c.h===0){tf=2*uy/g}else if(c.mode==='horizontal'){tf=Math.sqrt(2*c.h/g)}else{tf=(uy+Math.sqrt(uy*uy+2*g*c.h))/g}const range=ux*tf;const ymax=c.h+Math.max(0,uy*uy/(2*g));return{g,ux,uy,tf,range,ymax:Math.max(ymax,c.h,1)}}
function getMap(c,w,h){const tr=trajectory(c);const L=58,R=24,T=26,B=48,plotW=w-L-R,plotH=h-T-B,maxX=tr.range*1.12,maxY=Math.max(tr.ymax*1.20,c.h*1.15+3,8);return{tr,L,R,T,B,plotW,plotH,maxX,maxY,groundY:h-B,x:x=&gt;L+(x/maxX)*plotW,y:y=&gt;h-B-(y/maxY)*plotH}}
function drawArrow(ctx,x1,y1,x2,y2,col,label,offx=5,offy=-5){ctx.save();ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2.2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();const ang=Math.atan2(y2-y1,x2-x1),len=8;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-len*Math.cos(ang-Math.PI/6),y2-len*Math.sin(ang-Math.PI/6));ctx.lineTo(x2-len*Math.cos(ang+Math.PI/6),y2-len*Math.sin(ang+Math.PI/6));ctx.closePath();ctx.fill();ctx.font='bold 13px Arial';ctx.fillText(label,x2+offx,y2+offy);ctx.restore()}
function drawBackground(ctx,w,h,map,c){ctx.clearRect(0,0,w,h);let grad=ctx.createLinearGradient(0,0,0,h);grad.addColorStop(0,'#e9fbff');grad.addColorStop(1,'#ffffff');ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);ctx.fillStyle='rgba(255,255,255,.9)';ctx.beginPath();ctx.arc(w*.78,42,30,0,Math.PI*2);ctx.arc(w*.86,54,18,0,Math.PI*2);ctx.rect(w*.72,42,w*.22,25);ctx.fill();ctx.fillStyle='#5c8d39';ctx.fillRect(0,map.groundY-8,w,8);ctx.fillStyle='#9b6638';ctx.fillRect(0,map.groundY,w,h-map.groundY);if(c.h&gt;0){const top=map.y(c.h);ctx.fillStyle='#8b5d3e';ctx.fillRect(map.x(0)-58,top,58,map.groundY-top);ctx.strokeStyle='#5a3421';ctx.lineWidth=2;ctx.strokeRect(map.x(0)-58,top,58,map.groundY-top);for(let i=0;i&lt;3;i++){ctx.fillStyle='#17364f';ctx.fillRect(map.x(0)-42,top+24+i*42,20,25)}drawArrow(ctx,map.x(0)-5,top+5,map.x(0)-5,map.groundY-4,'#333','Sy',8,-8);ctx.setLineDash([4,4]);ctx.strokeStyle='#444';ctx.beginPath();ctx.moveTo(map.x(0)-5,top);ctx.lineTo(map.x(0)-5,map.groundY);ctx.stroke();ctx.setLineDash([])}}
function drawCannon(ctx,map,c){const a=c.angle*Math.PI/180,mx=map.x(0),my=map.y(c.h);ctx.save();ctx.translate(mx,my);ctx.rotate(-a);ctx.fillStyle='#111';ctx.strokeStyle='#333';ctx.lineWidth=3;roundRect(ctx,-50,-14,54,23,7);ctx.fill();ctx.stroke();ctx.fillStyle='#333';ctx.fillRect(-7,-10,13,17);ctx.restore();if(c.h===0){ctx.fillStyle='#9c5b20';ctx.beginPath();ctx.arc(mx-40,my+28,20,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#5a3212';ctx.lineWidth=4;ctx.stroke();ctx.fillStyle='#d99433';ctx.beginPath();ctx.arc(mx-40,my+28,9,0,Math.PI*2);ctx.fill()}ctx.fillStyle='#ffe928';ctx.beginPath();ctx.arc(mx,my,6,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#d0a600';ctx.stroke();}
function roundRect(ctx,x,y,w,h,r){if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r)}else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}}
function phys(c,t){const tr=trajectory(c);let x=tr.ux*t,y=c.h+tr.uy*t-.5*tr.g*t*t;if(y&lt;0)y=0;let vy=tr.uy-tr.g*t;return{x,y,vx:tr.ux,vy,t}}
function drawInitialVectors(ctx,map,c){const mx=map.x(0),my=map.y(c.h),a=c.angle*Math.PI/180;drawArrow(ctx,mx,my,mx+48,my,colors.u,'uₓ',4,15);if(c.mode==='horizontal'){ctx.fillStyle=colors.u;ctx.font='bold 13px Arial';ctx.fillText('uᵧ = 0',mx+8,my-20)}else{drawArrow(ctx,mx,my,mx+Math.cos(a)*52,my-Math.sin(a)*52,colors.u,'u',5,-8);if(Math.abs(Math.sin(a))&gt;.1)drawArrow(ctx,mx,my,mx,my-Math.sin(a)*48,colors.u,'uᵧ',-28,Math.sin(a)&lt;0?18:-8);ctx.strokeStyle='#333';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(mx+55,my);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#123';ctx.font='bold 14px Arial';ctx.fillText('θ',mx+28,my+(c.angle&lt;0?18:-8))}}
function drawSx(ctx,map,range){const y=map.groundY+20,x1=map.x(0),x2=map.x(range);ctx.strokeStyle='#333';ctx.fillStyle='#000';ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.moveTo(x1,y-5);ctx.lineTo(x1,y+5);ctx.moveTo(x2,y-5);ctx.lineTo(x2,y+5);ctx.stroke();ctx.font='bold 14px Arial';ctx.fillText('Sx',(x1+x2)/2-9,y+17)}
function drawCase(c){const cv=document.getElementById('cv'+c.id);if(!cv)return;const {w,h,ctx}=resizeCanvas(cv);const map=getMap(c,w,h),s=state[c.id];drawBackground(ctx,w,h,map,c);drawCannon(ctx,map,c);if((s.playing||s.done||s.paused)&amp;&amp;s.trail.length){ctx.setLineDash([8,7]);ctx.strokeStyle=colors.path;ctx.lineWidth=2.2;ctx.beginPath();s.trail.forEach((p,i)=&gt;{const px=map.x(p.x),py=map.y(p.y);if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)});ctx.stroke();ctx.setLineDash([]);s.trail.forEach((p,i)=&gt;{if(i%18===0&amp;&amp;i&gt;0){ctx.fillStyle='#c8ced8';ctx.strokeStyle='#59626e';ctx.beginPath();ctx.arc(map.x(p.x),map.y(p.y),4.5,0,Math.PI*2);ctx.fill();ctx.stroke()}});let p=s.trail[s.trail.length-1],px=map.x(p.x),py=map.y(p.y);ctx.fillStyle='#d9dde6';ctx.strokeStyle='#334';ctx.beginPath();ctx.arc(px,py,7,0,Math.PI*2);ctx.fill();ctx.stroke();drawArrow(ctx,px+5,py,px+48,py,colors.vx,'vₓ',5,-5);const vyLen=Math.max(-56,Math.min(56,-p.vy*2.4));if(Math.abs(p.vy)&lt;0.8){ctx.fillStyle=colors.vy;ctx.font='bold 13px Arial';ctx.fillText('vᵧ = 0',px-10,py-17)}else drawArrow(ctx,px,py,px,py+vyLen,colors.vy,'vᵧ',6,vyLen&gt;0?17:-8);if(s.done)drawSx(ctx,map,map.tr.range)}else{drawInitialVectors(ctx,map,c)}}
function playCase(id){const c=cases.find(x=&gt;x.id===id),s=state[id];if(!s.trail.length||s.done){s.t=0;s.done=false;s.trail=[phys(c,0)]}s.playing=true;s.paused=false;updateButtons(id)}
function pauseCase(id){const s=state[id];if(s.playing){s.playing=false;s.paused=true}updateButtons(id)}
function stepCase(id){const c=cases.find(x=&gt;x.id===id),s=state[id],tr=trajectory(c);if(s.done){replayCase(id);return}s.playing=false;s.paused=true;if(!s.trail.length)s.trail=[phys(c,0)];s.t=Math.min(tr.tf,s.t+tr.tf/28);s.trail.push(phys(c,s.t));if(s.t&gt;=tr.tf){s.done=true;s.paused=false}updateButtons(id);drawCase(c)}
function replayCase(id){const c=cases.find(x=&gt;x.id===id),s=state[id];s.t=0;s.playing=false;s.paused=false;s.done=false;s.trail=[];updateButtons(id);drawCase(c)}
function updateButtons(id){const s=state[id];const p=document.getElementById('play'+id),pa=document.getElementById('pause'+id);if(!p||!pa)return;p.textContent=s.playing?'▶ PLAYING':'▶ PLAY';pa.disabled=!s.playing}
function animate(ts){if(lastTs===null)lastTs=ts;const dt=Math.min(0.04,(ts-lastTs)/1000);lastTs=ts;visibleCases().forEach(c=&gt;{const s=state[c.id];if(s.playing){const tr=trajectory(c);s.t+=dt*1.05;if(!s.trail.length)s.trail=[phys(c,0)];if(s.t&gt;=tr.tf){s.t=tr.tf;s.playing=false;s.done=true}s.trail.push(phys(c,s.t));updateButtons(c.id)}drawCase(c)});requestAnimationFrame(animate)}


window.addEventListener('resize',()=&gt;visibleCases().forEach(drawCase));cases.forEach(c=&gt;state[c.id]={t:0,playing:false,done:false,paused:false,trail:[]});makeCards();renderCaseList();updateSignPanel();requestAnimationFrame(animate);
&lt;/script&gt;
